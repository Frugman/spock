<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spock - Mes Plats</title>
    <link rel="stylesheet" href="spock.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0d1117">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>PLATS</h1>
        <div class="actions">
            <button class="btn-primary" id="btn-add-meal" style="width: auto; padding: 10px 15px;">+ Plat</button>
        </div>
    </header>

    <div class="container">
        <section id="view-plats" class="view-section active">
            <div id="meals-list" class="grid-2" style="display: grid; grid-template-columns: 1fr; gap: 15px;"></div>
        </section>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><div class="nav-icon">📊</div><span>Dash</span></a>
        <a href="journal.html" class="nav-item"><div class="nav-icon">📖</div><span>Journal</span></a>
        <a href="poids.html" class="nav-item"><div class="nav-icon">⚖️</div><span>Poids</span></a>
        <a href="plats.html" class="nav-item active"><div class="nav-icon">🍲</div><span>Plats</span></a>
        <a href="report.html" class="nav-item"><div class="nav-icon">📈</div><span>Report</span></a>
        <a href="explorer.html" class="nav-item"><div class="nav-icon">🔍</div><span>BASE</span></a>
        <a href="settings.html" class="nav-item"><div class="nav-icon">⚙️</div><span>Param</span></a>
    </nav>

    <!-- Modal for new meal -->
    <div id="meal-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Nouveau Plat</h2>
                <button class="btn-close" id="btn-close-meal-modal" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
            </div>
            <form id="frequent-meal-form">
                <div class="form-group"><label>Nom du plat</label><input type="text" id="f-meal-title" required></div>
                <div class="macro-grid">
                    <div class="form-group"><label>Calories</label><input type="number" id="f-meal-calories" required></div>
                    <div class="form-group"><label>Protéines</label><input type="number" id="f-meal-proteins" required></div>
                    <div class="form-group"><label>Glucides</label><input type="number" id="f-meal-carbs" required></div>
                    <div class="form-group"><label>Lipides</label><input type="number" id="f-meal-fats" required></div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 10px;">SAUVEGARDER</button>
            </form>
        </div>
    </div>

    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
