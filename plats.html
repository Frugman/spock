<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spock - Mes Plats</title>
    <link rel="stylesheet" href="spock.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0d1117">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>BIBLIO</h1>
    </header>

    <div class="container">
        <section id="view-plats" class="view-section active">
            <div class="section-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3>Mes Plats</h3>
                <button class="btn-primary" id="btn-add-meal" style="width: auto; padding: 5px 12px; font-size:0.8rem;">+ PLAT</button>
            </div>
            <div id="meals-list"></div>

            <div class="section-header" style="display:flex; justify-content:space-between; align-items:center; margin:30px 0 15px;">
                <h3>Mes Ingrédients</h3>
                <button class="btn-primary" id="btn-add-aliment" style="width: auto; padding: 5px 12px; font-size:0.8rem; background:var(--card-border);">+ INGR.</button>
            </div>
            <div id="aliments-list"></div>
        </section>
    </div>

    <!-- Modal for new meal -->
    <div id="meal-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nouveau Plat</h2>
                <button id="btn-close-meal-modal" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
            </div>
            <form id="frequent-meal-form">
                <div class="form-group"><label>Nom</label><input type="text" id="f-meal-title" required></div>
                <div class="macro-grid">
                    <div class="form-group">
                        <label>Unité de référence</label>
                        <select id="f-meal-unit" onchange="toggleMealWeightInput()">
                            <option value="unité">Portion / Unité (Défaut)</option>
                            <option value="100g">100g</option>
                            <option value="g">L'unité est 1g</option>
                            <option value="ml">millilitres (ml)</option>
                            <option value="cl">centilitres (cl)</option>
                        </select>
                    </div>
                    <div class="form-group" id="f-meal-weight-group" style="display:none;">
                        <label>Poids du plat/portion (g)</label>
                        <input type="number" id="f-meal-weight" placeholder="Poids en g">
                    </div>
                </div>
                <div class="macro-grid">
                    <div class="form-group"><label>Calories (kcal)</label><input type="number" id="f-meal-calories" required></div>
                    <div class="form-group"><label>Protéines (g)</label><input type="number" id="f-meal-proteins" required></div>
                    <div class="form-group"><label>Glucides (g)</label><input type="number" id="f-meal-carbs" required></div>
                    <div class="form-group"><label>Lipides (g)</label><input type="number" id="f-meal-fats" required></div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 15px;">SAUVEGARDER</button>
            </form>
        </div>
    </div>

    <!-- Modal for new aliment -->
    <div id="aliment-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nouvel Ingrédient</h2>
                <button id="btn-close-aliment-modal" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
            </div>
            <form id="aliment-form">
                <div class="form-group"><label>Nom</label><input type="text" id="a-title" required></div>
                <div class="macro-grid">
                    <div class="form-group">
                        <label>Unité de référence</label>
                        <select id="a-unit" onchange="toggleWeightInput()">
                            <option value="100g">100g (Défaut)</option>
                            <option value="unité">Portion / Unité</option>
                            <option value="g">L'unité est 1g</option>
                            <option value="ml">millilitres (ml)</option>
                            <option value="cl">centilitres (cl)</option>
                            <option value="cs">Cuillère à Soupe (CS)</option>
                            <option value="cc">Cuillère à Café (cc)</option>
                            <option value="verre">Verre</option>
                            <option value="bol">Bol</option>
                        </select>
                    </div>
                    <div class="form-group" id="a-weight-group" style="display:none;">
                        <label>Poids du plat/portion (g)</label>
                        <input type="number" id="a-weight" placeholder="Poids en g">
                    </div>
                </div>
                <div class="macro-grid">
                    <div class="form-group"><label>Calories (kcal)</label><input type="number" id="a-calories" required></div>
                    <div class="form-group"><label>Protéines (g)</label><input type="number" id="a-proteins" required></div>
                    <div class="form-group"><label>Glucides (g)</label><input type="number" id="a-carbs" required></div>
                    <div class="form-group"><label>Lipides (g)</label><input type="number" id="a-fats" required></div>
                </div>
                <button type="submit" class="btn-primary" style="margin-top: 15px;">SAUVEGARDER</button>
            </form>
        </div>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><div class="nav-icon">📊</div><span>Dash</span></a>
        <a href="journal.html" class="nav-item"><div class="nav-icon">📖</div><span>Journal</span></a>
        <a href="poids.html" class="nav-item"><div class="nav-icon">⚖️</div><span>Poids</span></a>
        <a href="plats.html" class="nav-item active"><div class="nav-icon">🍲</div><span>Plats</span></a>
        <a href="report.html" class="nav-item"><div class="nav-icon">📈</div><span>Report</span></a>
        <a href="explorer.html" class="nav-item"><div class="nav-icon">🔍</div><span>BASE</span></a>
        <a href="settings.html" class="nav-item"><div class="nav-icon">⚙️</div><span>Param</span></a>
    </nav>

    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
