<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Journal - Spock</title>
    <meta name="description" content="Journal alimentaire logique.">
    <link rel="stylesheet" href="style.css">
    
    <!-- PWA & Favicons -->
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#238636">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="spock-theme">
    <div class="glass-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🖖</span>
                <h1 class="logo-text">SPOCK</h1>
            </div>
            <nav class="main-nav">
                <ul>
                    <li class="nav-item">
                        <a href="index.html"><i class="icon">📊</i> Dashboard</a>
                    </li>
                    <li class="nav-item active">
                        <a href="journal.html"><i class="icon">📖</i> Journal</a>
                    </li>
                    <li class="nav-item">
                        <a href="poids.html"><i class="icon">⚖️</i> Poids</a>
                    </li>
                    <li class="nav-item">
                        <a href="plats.html"><i class="icon">🍲</i> Plats</a>
                    </li>
                    <li class="nav-item">
                        <a href="report.html"><i class="icon">📈</i> Report</a>
                    </li>
                    <li class="nav-item">
                        <a href="explorer.html"><i class="icon">🔍</i> OFF Explorer</a>
                    </li>
                    <li class="nav-item">
                        <a href="settings.html"><i class="icon">⚙️</i> Paramètres</a>
                    </li>
                </ul>
            </nav>
            <div class="user-status">
                <div class="status-indicator online"></div>
                <span class="user-name">Live Long & Prosper</span>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content">
            <header class="top-bar">
                <div class="search-box">
                    <input type="text" placeholder="Rechercher..." id="main-search">
                </div>
                <div class="actions">
                    <button class="btn-primary" id="btn-add-entry">+ Nouveau Repas</button>
                </div>
            </header>

            <section id="view-journal" class="view-section active">
                <h2>Journal Alimentaire</h2>
                <div id="journal-timeline" class="timeline"></div>
            </section>
        </main>
    </div>

    <!-- Modal for new entry (Overhauled: Meal Basket) -->
    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Nouveau Repas</h2>
                <button class="btn-close" id="btn-close-modal">&times;</button>
            </div>

            <div class="meal-meta-row" style="display: flex; gap: 10px; margin-bottom: 1.5rem;">
                <div class="form-group" style="flex: 1;">
                    <label>Date</label>
                    <input type="date" id="meal-date">
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Type</label>
                    <select id="meal-type" class="btn-secondary" style="width: 100%; height: 42px;">
                        <option value="Petit-déjeuner">☕ Petit-déjeuner</option>
                        <option value="Déjeuner">🍲 Déjeuner</option>
                        <option value="Dîner">🥗 Dîner</option>
                        <option value="En-cas">🍎 En-cas</option>
                    </select>
                </div>
            </div>

            <!-- Basket: Added items list -->
            <div id="meal-basket-list" class="basket-container" style="margin-bottom: 1.5rem; min-height: 50px; background: rgba(255,255,255,0.02); border-radius: 8px; border: 1px dashed var(--card-border); padding: 10px;">
                <div class="empty-state" style="font-size: 0.8rem;">Aucun aliment ajouté.</div>
            </div>

            <!-- Totals display -->
            <div id="basket-totals" class="detail-macros" style="margin-bottom: 2rem; background: var(--card-bg); padding: 10px; border-radius: 8px;">
                <div class="detail-macro"><span>Cal</span><b id="total-cal">0</b></div>
                <div class="detail-macro"><span>Prot</span><b id="total-prot">0g</b></div>
                <div class="detail-macro"><span>Gluc</span><b id="total-carbs">0g</b></div>
                <div class="detail-macro"><span>Lip</span><b id="total-fats">0g</b></div>
            </div>

            <!-- Search & Quick Selection -->
            <div class="search-section" style="border-top: 1px solid var(--card-border); padding-top: 1.5rem;">
                <label>Ajouter des aliments</label>
                <div class="off-search-container">
                    <input type="text" id="off-search" placeholder="Chercher un produit (Open Food Facts)...">
                    <ul id="off-results" class="off-results"></ul>
                </div>
                
                <div class="quick-favs" style="display: flex; gap: 10px; margin-top: 10px;">
                    <button class="btn-secondary" id="btn-fav-meals" style="flex: 1; padding: 10px; font-size: 0.8rem;">🍲 Mes Plats</button>
                    <button class="btn-secondary" id="btn-fav-aliments" style="flex: 1; padding: 10px; font-size: 0.8rem;">🍎 Mes Aliments</button>
                </div>
                <div id="selection-list" class="off-results" style="display: none; margin-top: 10px; max-height: 200px; overflow-y: auto;"></div>
            </div>

            <div class="form-actions" style="margin-top: 2rem; display: flex; flex-direction: column; gap: 10px;">
                <div class="image-upload-zone" id="img-zone" style="margin-bottom: 1rem;">
                    <div id="upload-prompt"><span>📸 Photo du repas</span></div>
                    <img id="preview-img" src="#" alt="Aperçu">
                    <input type="file" id="meal-photo" class="hidden-input" accept="image/*">
                </div>
                <button type="button" class="btn-primary" id="btn-save-full-meal" style="width: 100%; padding: 15px; font-size: 1.1rem; box-shadow: 0 4px 15px var(--accent-glow);">Enregistrer le Repas</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
