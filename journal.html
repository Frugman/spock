<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spock - Journal</title>
    <link rel="stylesheet" href="spock.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#0d1117">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>JOURNAL</h1>
        <div class="actions">
            <button class="btn-primary" id="btn-add-entry" style="width: auto; padding: 10px 15px;">+ Repas</button>
        </div>
    </header>

    <div class="container">
        <section id="view-journal" class="view-section active">
            <div id="journal-timeline" class="timeline"></div>
        </section>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><div class="nav-icon">📊</div><span>Dash</span></a>
        <a href="journal.html" class="nav-item active"><div class="nav-icon">📖</div><span>Journal</span></a>
        <a href="poids.html" class="nav-item"><div class="nav-icon">⚖️</div><span>Poids</span></a>
        <a href="plats.html" class="nav-item"><div class="nav-icon">🍲</div><span>Plats</span></a>
        <a href="report.html" class="nav-item"><div class="nav-icon">📈</div><span>Report</span></a>
        <a href="explorer.html" class="nav-item"><div class="nav-icon">🔍</div><span>BASE</span></a>
        <a href="settings.html" class="nav-item"><div class="nav-icon">⚙️</div><span>Param</span></a>
    </nav>

    <!-- Modal for new entry -->
    <div id="entry-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header" style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>Nouveau Repas</h2>
                <button class="btn-close" id="btn-close-modal" style="background:none; border:none; color:white; font-size:24px;">&times;</button>
            </div>
            <div class="form-group"><label>Date</label><input type="date" id="meal-date"></div>
            <div class="form-group"><label>Type</label><select id="meal-type"><option value="Petit-déjeuner">☕ Petit-déjeuner</option><option value="Déjeuner">🍲 Déjeuner</option><option value="Dîner">🥗 Dîner</option><option value="En-cas">🍎 En-cas</option></select></div>
            <div id="meal-basket-list" class="card" style="min-height:50px; border-style:dashed;"><div class="empty-state">Panier vide.</div></div>
            <div id="basket-totals" class="card" style="margin-bottom:20px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:8px; border-bottom:1px solid rgba(255,255,255,0.05); padding-bottom:5px;">
                    <span>🔥 Calories (kcal)</span><strong id="total-cal">0</strong>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; text-align:center; font-size:0.85rem;">
                    <div>
                        <span style="color:var(--text-secondary);">🥩 Protéines (g)</span><br>
                        <strong id="total-prot">0</strong> <small id="prot-pct">(0%)</small>
                    </div>
                    <div>
                        <span style="color:var(--text-secondary);">🍞 Glucides (g)</span><br>
                        <strong id="total-gluc">0</strong> <small id="gluc-pct">(0%)</small>
                    </div>
                    <div>
                        <span style="color:var(--text-secondary);">🥑 Lipides (g)</span><br>
                        <strong id="total-lip">0</strong> <small id="lip-pct">(0%)</small>
                    </div>
                </div>
            </div>
            <div class="search-box">
                <label style="font-size:0.75rem; color:var(--accent-color); font-weight:700;">Ajouter l'un de mes ingrédients</label>
                <input type="text" id="fav-aliments-search" placeholder="Nom de votre ingrédient...">
                <ul id="fav-aliments-results" class="hidden" style="list-style:none; padding:0; margin-top:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:10px;"></ul>
            </div>

            <div class="search-box">
                <label style="font-size:0.75rem; color:var(--accent-color); font-weight:700;">Ajouter un repas favori</label>
                <input type="text" id="fav-meals-search" placeholder="Nom de votre plat favori...">
                <ul id="fav-meals-results" class="hidden" style="list-style:none; padding:0; margin-top:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:10px;"></ul>
            </div>

            <div class="search-box">
                <label style="font-size:0.75rem; color:var(--accent-color); font-weight:700;">Ajouter un aliment de la Base</label>
                <input type="text" id="off-search" placeholder="Nom de l'aliment dans CIQUAL...">
                <ul id="off-results" class="hidden" style="list-style:none; padding:0; margin-top:10px; max-height:200px; overflow-y:auto; background:rgba(0,0,0,0.3); border-radius:10px;"></ul>
            </div>
            <button type="button" class="btn-primary" id="btn-save-full-meal">ENREGISTRER</button>
        </div>
    </div>

    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
