<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report - Spock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="spock-theme">
    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo"><span class="logo-icon">🖖</span><h1 class="logo-text">SPOCK</h1></div>
            <nav class="main-nav">
                <ul>
                    <li class="nav-item"><a href="index.html"><i class="icon">📊</i> Dashboard</a></li>
                    <li class="nav-item"><a href="journal.html"><i class="icon">📖</i> Journal</a></li>
                    <li class="nav-item"><a href="poids.html"><i class="icon">⚖️</i> Poids</a></li>
                    <li class="nav-item"><a href="plats.html"><i class="icon">🍲</i> Plats</a></li>
                    <li class="nav-item active"><a href="report.html"><i class="icon">📈</i> Report</a></li>
                    <li class="nav-item"><a href="explorer.html"><i class="icon">🔍</i> OFF Explorer</a></li>
                    <li class="nav-item"><a href="settings.html"><i class="icon">⚙️</i> Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div class="search-box"><input type="text" placeholder="Rechercher..." id="main-search"></div>
                <div class="actions"></div>
            </header>

            <section id="view-report" class="view-section active">
                <h2>Spock Report</h2>
                <div class="dashboard-grid">
                    <div class="card"><h3>Moyenne Calories</h3><p class="big-stat" id="avg-calories">-- kcal</p></div>
                    <div class="card"><h3>Moyenne Protéines</h3><p class="big-stat" id="avg-proteins">-- g</p></div>
                    <div class="card"><h3>Aliments fréquents</h3><ul id="top-foods" class="notes-list"><li>Chargement...</li></ul></div>
                    <div class="card"><h3>Évolution Poids</h3><p class="big-stat" id="weight-diff">-- kg</p></div>
                </div>
            </section>
        </main>
    </div>



    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
