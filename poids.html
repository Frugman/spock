<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spock - Poids</title>
    <link rel="stylesheet" href="spock.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0d1117">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>POIDS</h1>
    </header>

    <div class="container">
        <section id="view-weight" class="view-section active">
            <div class="card" style="margin-bottom:20px;">
                <h3>Diagramme</h3>
                <div style="height:200px; padding:10px;">
                    <canvas id="weightChart"></canvas>
                </div>
            </div>

            <div class="card" style="margin-bottom:20px;">
                <h3>Nouvelle Pesée</h3>
                <div class="form-group" style="display:flex; gap:10px; margin-top:10px;">
                    <input type="number" id="new-weight" step="0.1" placeholder="75.0">
                    <button class="btn-primary" id="btn-save-weight" style="width:auto;">OK</button>
                </div>
            </div>

            <div class="card">
                <h3>Historique</h3>
                <div id="weight-list"></div>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><div class="nav-icon">📊</div><span>Dash</span></a>
        <a href="journal.html" class="nav-item"><div class="nav-icon">📖</div><span>Journal</span></a>
        <a href="poids.html" class="nav-item active"><div class="nav-icon">⚖️</div><span>Poids</span></a>
        <a href="plats.html" class="nav-item"><div class="nav-icon">🍲</div><span>Plats</span></a>
        <a href="report.html" class="nav-item"><div class="nav-icon">📈</div><span>Report</span></a>
        <a href="explorer.html" class="nav-item"><div class="nav-icon">🔍</div><span>BASE</span></a>
        <a href="settings.html" class="nav-item"><div class="nav-icon">⚙️</div><span>Param</span></a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
