<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poids - Spock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#238636">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="spock-theme">
    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo"><span class="logo-icon">🖖</span><h1 class="logo-text">SPOCK</h1></div>
            <nav class="main-nav">
                <ul>
                    <li class="nav-item"><a href="index.html"><i class="icon">📊</i> Dashboard</a></li>
                    <li class="nav-item"><a href="journal.html"><i class="icon">📖</i> Journal</a></li>
                    <li class="nav-item active"><a href="poids.html"><i class="icon">⚖️</i> Poids</a></li>
                    <li class="nav-item"><a href="plats.html"><i class="icon">🍲</i> Plats</a></li>
                    <li class="nav-item"><a href="report.html"><i class="icon">📈</i> Report</a></li>
                    <li class="nav-item"><a href="explorer.html"><i class="icon">🔍</i> OFF Explorer</a></li>
                    <li class="nav-item"><a href="settings.html"><i class="icon">⚙️</i> Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div class="search-box"><input type="text" placeholder="Rechercher..." id="main-search"></div>
                <div class="actions"><button class="btn-primary" id="btn-add-entry">+ Nouveau Repas</button></div>
            </header>

            <section id="view-weight" class="view-section active">
                <h2>Suivi de Poids</h2>
                <div class="card" style="max-width: 400px; margin-bottom: 2rem;">
                    <form id="weight-form">
                        <div class="form-group"><label for="weight-value">Poids du jour (kg)</label><input type="number" id="weight-value" step="0.1" required></div>
                        <div class="form-actions"><button type="submit" class="btn-primary" style="width: 100%;">Enregistrer</button></div>
                    </form>
                </div>
                <div class="card">
                    <h3>Évolution</h3>
                    <div style="height: 300px; position: relative;"><canvas id="weight-chart"></canvas></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Need entry-modal here too because of Top Bar btn -->
    <div id="entry-modal" class="modal">
        <div class="modal-content"><p>Ouvrez le Journal pour ajouter un repas complet.</p><button onclick="window.location.href='journal.html'">Aller au Journal</button><button class="btn-close" onclick="document.getElementById('entry-modal').classList.remove('active')">&times;</button></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
