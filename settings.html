<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paramètres - Spock</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="spock-theme">
    <div class="glass-container">
        <aside class="sidebar">
            <div class="logo"><span class="logo-icon">🖖</span><h1 class="logo-text">SPOCK</h1></div>
            <nav class="main-nav">
                <ul>
                    <li class="nav-item"><a href="index.html"><i class="icon">📊</i> Dashboard</a></li>
                    <li class="nav-item"><a href="journal.html"><i class="icon">📖</i> Journal</a></li>
                    <li class="nav-item"><a href="poids.html"><i class="icon">⚖️</i> Poids</a></li>
                    <li class="nav-item"><a href="plats.html"><i class="icon">🍲</i> Plats</a></li>
                    <li class="nav-item"><a href="report.html"><i class="icon">📈</i> Report</a></li>
                    <li class="nav-item"><a href="explorer.html"><i class="icon">🔍</i> OFF Explorer</a></li>
                    <li class="nav-item active"><a href="settings.html"><i class="icon">⚙️</i> Paramètres</a></li>
                </ul>
            </nav>
        </aside>

        <main class="content">
            <header class="top-bar">
                <div class="search-box"><input type="text" placeholder="Rechercher..." id="main-search"></div>
                <div class="actions"><button class="btn-primary" id="btn-add-entry">+ Nouveau Repas</button></div>
            </header>

            <section id="view-settings" class="view-section active">
                <h2>Paramètres</h2>
                <div class="card settings-card">
                    <p>Configurez ici vos accès GitHub.</p>
                    <div class="form-group"><label>Pseudo GitHub</label><input type="text" id="gh-user"></div>
                    <div class="form-group"><label>Nom du dépôt</label><input type="text" id="gh-repo"></div>
                    <div class="form-group"><label>Token Secret (PAT)</label><input type="password" id="gh-token"></div>
                    <div class="form-actions"><button class="btn-primary" id="btn-save-settings">Enregistrer</button></div>
                    <div id="settings-status" class="status-msg"></div>
                </div>
                <div class="card settings-card" style="margin-top: 2rem; border-color: var(--danger-color);">
                    <h3 style="color: var(--danger-color);">Zone de Danger</h3>
                    <p>Réinitialiser les fichiers locaux.</p>
                    <button class="btn-secondary" id="btn-reset-data">Réinitialiser les données</button>
                </div>
            </section>
        </main>
    </div>

    <div id="entry-modal" class="modal">
        <div class="modal-content"><p>Ouvrez le Journal pour ajouter un repas complet.</p><button onclick="window.location.href='journal.html'">Aller au Journal</button><button class="btn-close" onclick="document.getElementById('entry-modal').classList.remove('active')">&times;</button></div>
    </div>

    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
