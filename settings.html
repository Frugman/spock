<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spock - Paramètres</title>
    <link rel="stylesheet" href="spock.css">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#0d1117">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>PARAM</h1>
    </header>

    <div class="container">
        <section id="view-settings" class="view-section active">
            <div class="card" style="margin-bottom:20px;">
                <h3>GitHub Sync</h3>
                <div class="form-group"><label>User</label><input type="text" id="gh-user" placeholder="Frugman"></div>
                <div class="form-group"><label>Repo</label><input type="text" id="gh-repo" placeholder="spock"></div>
                <div class="form-group"><label>Token</label><input type="password" id="gh-token" placeholder="ghp_..."></div>
                <button class="btn-primary" id="btn-save-settings">SYNCHRONISER</button>
                <div id="settings-status" style="margin-top: 10px; font-size: 0.9rem; text-align: center; color:var(--accent-color);"></div>
            </div>

            <div class="card">
                <h3>Objectifs</h3>
                <div class="form-group">
                    <label>Calories journalières</label>
                    <input type="number" id="target-cal" placeholder="1600">
                </div>
                <button class="btn-primary" id="btn-save-objectifs" style="background:var(--card-border);">METTRE À JOUR</button>
            </div>
        </section>
    </div>

    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><div class="nav-icon">📊</div><span>Dash</span></a>
        <a href="journal.html" class="nav-item"><div class="nav-icon">📖</div><span>Journal</span></a>
        <a href="poids.html" class="nav-item"><div class="nav-icon">⚖️</div><span>Poids</span></a>
        <a href="plats.html" class="nav-item"><div class="nav-icon">🍲</div><span>Plats</span></a>
        <a href="report.html" class="nav-item"><div class="nav-icon">📈</div><span>Report</span></a>
        <a href="explorer.html" class="nav-item"><div class="nav-icon">🔍</div><span>BASE</span></a>
        <a href="settings.html" class="nav-item active"><div class="nav-icon">⚙️</div><span>Param</span></a>
    </nav>

    <script src="github-api.js"></script>
    <script src="app.js"></script>
</body>
</html>
